<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
  <link rel="icon" type="image/x-icon"  href="assets/favicon/favicon.ico" sizes="16x16 32x32 48x48" />

  <!-- Google Fonts: Syne (display) + Inter (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ════════════════════════════════
       NAVIGATION BAR — language toggle
       ════════════════════════════════ -->
  <nav class="navbar">
    <button class="lang-btn" id="lang-btn" aria-label="Switch language">
      <!-- Globe icon -->
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
      </svg>
      <span id="lang-label">IT</span>
    </button>
  </nav>

  <!-- ════════════════════════════════
       MAIN CARD — contains all screens
       ════════════════════════════════ -->
  <div class="card">

    <!-- ── INTRO SCREEN ── -->
    <div class="screen active" id="screen-intro">
      <div class="intro-badge" id="intro-badge">Quiz</div>

      <!--
        The title is split into three spans so the i18n system can
        independently translate each part while keeping the <span>
        accent colour on the key word.
      -->
      <h1 class="intro-title">
        <span id="intro-title-1">Put your</span><br>
        <span id="intro-title-2" class="accent">mind</span><br>
        <span id="intro-title-3">to the test</span>
      </h1>

      <p class="intro-desc" id="intro-desc">
        10 questions on general knowledge, science and curiosities.
        Pick the right answer and discover your final score.
      </p>

      <!-- Meta info row: duration / question count / score -->
      <div class="intro-meta">
        <div class="meta-item">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="meta-time">~3 minutes</span>
        </div>
        <div class="meta-item">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <span id="meta-questions">10 questions</span>
        </div>
        <div class="meta-item">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span id="meta-score">Final score</span>
        </div>
      </div>

      <button class="btn" id="btn-start">Start quiz</button>
    </div>

    <!-- ── QUIZ SCREEN ── -->
    <div class="screen" id="screen-quiz">

      <!-- Action bar: secondary controls visible during the quiz -->
      <div class="quiz-action-bar">
        <button class="action-btn" id="btn-to-menu">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          <span id="lbl-to-menu">Menu</span>
        </button>
        <button class="action-btn" id="btn-restart-mid">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          <span id="lbl-restart-mid">Restart</span>
        </button>
      </div>

      <!-- Progress bar with label -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="prog-text">Question 1 of 10</span>
          <span id="prog-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Question number, text and options (populated by JS) -->
      <div class="question-num" id="q-num">01</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>

      <!-- Inline answer feedback ("Correct!" / "Wrong, the answer was …") -->
      <div class="feedback" id="feedback"></div>

      <button class="btn" id="btn-next" disabled>Next question</button>
    </div>

    <!-- ── RESULT SCREEN ── -->
    <div class="screen" id="screen-result">
      <!-- Large gradient score e.g. "8/10" -->
      <div class="result-score" id="res-score">0/10</div>
      <div class="result-label" id="result-label">Final score</div>

      <!-- Contextual message based on the score range -->
      <div class="result-msg" id="res-msg"></div>

      <!-- Three stat tiles -->
      <div class="result-breakdown">
        <div class="breakdown-item">
          <div class="breakdown-num c" id="res-correct">0</div>
          <div class="breakdown-lbl" id="lbl-correct">Correct</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num w" id="res-wrong">0</div>
          <div class="breakdown-lbl" id="lbl-wrong">Wrong</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num accent" id="res-pct">0%</div>
          <div class="breakdown-lbl" id="lbl-pct">Percentage</div>
        </div>
      </div>

      <button class="btn" id="btn-restart">Try again</button>
    </div>

  </div><!-- /.card -->

  <!-- Main script (loaded last so all DOM elements are available) -->
  <script src="js/script.js"></script>

</body>
</html>
